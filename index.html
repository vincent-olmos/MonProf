<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Prof de Technologie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="chat-container">
        <header>
            <h1>Mon Prof de TECHNO</h1>
            <p>Application complémentaire au cours de Technologie</p>
        </header>

        <div id="messages">
            <div class="message ia-message">
        You can use another language if you prefer. Mais il faut toujours favoriser le français au collège.        
            </div>
        </div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="Posez-moi une question..." />
            <button id="new-diagnosis-button">Autre Question</button>
            <button id="send-button">Envoyer</button>
        </div>
    </div>
<script type="module" src="script.js"></script>
</body>
</html>
